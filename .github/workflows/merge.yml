name: Merge
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: take
        run: |
          wget -O abpvn-ext.txt https://raw.githubusercontent.com/abpvn/abpvn/master/filter/abpvn.txt https://raw.githubusercontent.com/luxysiv/filters/main/ext.txt

      - name: Generate date 
        run: echo "DATE=$(date +%F)" >> $GITHUB_ENV

      - name: Commit filters 
        uses: EndBug/add-and-commit@v9.1.1
        with:
          add: 'abpvn-ext.txt'
          default_author: github_actions 
          message: 'Cập nhật bộ lọc: ${{ env.DATE }}'
          push: true
          
        
      - name: Release 
        uses: softprops/action-gh-release@v1
        with:
          files: abpvn-ext.txt 
          name: abpvn mod ${{ env.DATE }}
          tag_name: ${{ env.DATE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete older releases
        uses: dev-drprasad/delete-older-releases@v0.2.1
        with:
          keep_latest: 1
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
