name: CI
on:
  push:
    branches: [ main ]
    paths:
      - "abpvn-ext.txt"
  schedule:
   - cron: "10 * * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Cat
        run: wget -i lists -O filters.txt

      - name: Generate date 
        run: echo "DATE=$(date +%F)" >> $GITHUB_ENV

      - name: Commit filters
        uses: EndBug/add-and-commit@v9.1.1
        with:
          add: 'filters.txt'
          default_author: github_actor 
          message: 'Cập nhật bộ lọc: ${{ env.DATE }}'
          push: true
